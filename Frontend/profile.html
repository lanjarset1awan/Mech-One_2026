<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Mech-ONE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/profile.css">
</head>

<body class="antialiased pb-20">

    <!-- Navbar -->
    <nav class="w-full z-50 bg-[#0a1d37]/60 backdrop-blur-md border-b border-white/10 sticky top-0">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-xl font-black tracking-tighter">
                <a href="index.html">MECH<span class="text-[#ffcc00]">-ONE</span></a>
            </div>
            <div class="font-bold uppercase tracking-widest text-sm text-gray-300">
                My Profile
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="logout()" class="text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-colors"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 mt-10 grid md:grid-cols-3 gap-8">
        
        <!-- Left Column: User Info -->
        <div class="md:col-span-1 space-y-6">
            <div class="glass-panel p-6">
                <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                    <h3 class="text-lg font-bold uppercase tracking-widest text-[#ffcc00]">Personal Info</h3>
                    <button onclick="toggleEdit()" class="text-xs text-[#00a8e8] hover:text-white uppercase tracking-widest font-bold"><i class="fas fa-edit"></i> Edit</button>
                </div>
                
                <div id="info-display" class="space-y-4">
                    <div>
                        <p class="text-xs text-gray-400">Full Name</p>
                        <p id="disp-name" class="font-semibold text-lg">...</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400">Major</p>
                        <p id="disp-major" class="font-semibold">...</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400">Gender</p>
                        <p id="disp-gender" class="font-semibold">...</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400">Batch</p>
                        <p id="disp-batch" class="font-semibold">...</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400">Email</p>
                        <p id="disp-email" class="font-semibold">...</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-400">Whatsapp Number</p>
                        <p id="disp-wa" class="font-semibold">...</p>
                    </div>
                </div>

                <!-- Edit Form (Hidden by default) -->
                <div id="info-edit" class="hidden space-y-4">
                    <div>
                        <label class="text-xs text-gray-400">Major</label>
                        <input id="input-major" type="text" class="input-field w-full px-3 py-2 rounded-sm text-sm" />
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Gender</label>
                        <select id="input-gender" class="input-field w-full px-3 py-2 rounded-sm text-sm">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Batch</label>
                        <input id="input-batch" type="text" class="input-field w-full px-3 py-2 rounded-sm text-sm" />
                    </div>
                    <div>
                        <label class="text-xs text-gray-400">Whatsapp Number</label>
                        <input id="input-wa" type="text" class="input-field w-full px-3 py-2 rounded-sm text-sm" />
                    </div>
                    <button id="saveInfoBtn" class="w-full mt-2 py-2 bg-[#00a8e8] text-white text-xs font-bold uppercase tracking-widest rounded-sm hover:bg-blue-500">Save Changes</button>
                </div>
            </div>
        </div>

        <!-- Right Column: Documents -->
        <div class="md:col-span-2">
            <div class="glass-panel p-6 md:p-8">
                <div class="flex justify-between items-end mb-6 border-b border-white/10 pb-4">
                    <div>
                        <h3 class="text-2xl font-black uppercase tracking-tight">Documents</h3>
                        <p class="text-sm text-gray-400">Upload all required documents to register for competitions.</p>
                    </div>
                </div>

                <div id="documents-list" class="space-y-2">
                    <!-- Dynamically populated via JS -->
                    <div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl text-gray-500"></i></div>
                </div>
                
                <!-- Batch Upload Form for any new files -->
                <form id="uploadForm" class="mt-8 pt-6 border-t border-white/10 hidden">
                    <button type="submit" id="uploadBtn" class="w-full py-4 bg-[#ffcc00] hover:bg-yellow-400 text-[#0a1d37] font-bold rounded-sm transition-colors uppercase text-sm tracking-widest shadow-lg shadow-yellow-900/30">
                        Upload Selected Files
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="./js/api.js"></script>
    <script src="./js/popup.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "login.html";

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "index.html";
        }

        let isEditing = false;
        function toggleEdit() {
            isEditing = !isEditing;
            document.getElementById('info-display').classList.toggle('hidden', isEditing);
            document.getElementById('info-edit').classList.toggle('hidden', !isEditing);
        }

        const requiredDocs = [
            { id: 'student_card_url', label: 'Student ID Card' },
            { id: 'instagram_story_url', label: 'Proof of Instagram Story' },
            { id: 'twibbon_url', label: 'Proof of Twibbon' },
            { id: 'instagram_follow_url', label: 'Proof of Following Instagram' },
            { id: 'linkedin_follow_url', label: 'Proof of Following LinkedIn' },
            { id: 'tiktok_follow_url', label: 'Proof of Following TikTok' },
            { id: 'repost_instagram_url', label: 'Proof of Repost Competition Instagram' }
        ];

        let pendingFiles = new FormData();
        let hasPendingFiles = false;

        async function loadProfile() {
            try {
                const user = await getProfile(token);
                
                // Populate Texts
                document.getElementById('disp-name').innerText = user.full_name || '-';
                document.getElementById('disp-major').innerText = user.major || '-';
                document.getElementById('disp-gender').innerText = user.gender || '-';
                document.getElementById('disp-batch').innerText = user.batch || '-';
                document.getElementById('disp-email').innerText = user.email || '-';
                document.getElementById('disp-wa').innerText = user.whatsapp_number || '-';

                // Populate Edit Form
                document.getElementById('input-major').value = user.major || '';
                document.getElementById('input-gender').value = user.gender || 'Male';
                document.getElementById('input-batch').value = user.batch || '';
                document.getElementById('input-wa').value = user.whatsapp_number || '';

                // Render Documents
                const docContainer = document.getElementById('documents-list');
                docContainer.innerHTML = '';
                
                requiredDocs.forEach(doc => {
                    const url = user[doc.id];
                    const div = document.createElement('div');
                    div.className = 'doc-item';
                    
                    let actionHtml = '';
                    if (url) {
                        actionHtml = `<a href="${url}" target="_blank" class="px-5 py-2 bg-white/10 hover:bg-white/20 text-white text-xs font-bold uppercase tracking-widest rounded-sm transition-colors flex items-center gap-2 border border-white/20"><i class="fas fa-eye"></i> View file</a>`;
                    } else {
                        actionHtml = `
                            <label for="${doc.id}" class="file-label px-5 py-2 bg-[#00a8e8]/20 hover:bg-[#00a8e8]/40 text-[#00a8e8] text-xs font-bold uppercase tracking-widest rounded-sm transition-colors flex items-center gap-2 border border-[#00a8e8]/50">
                                <i class="fas fa-upload"></i> <span id="label-${doc.id}">Select File</span>
                            </label>
                            <input type="file" id="${doc.id}" accept="image/*,.pdf" onchange="handleFileSelect('${doc.id}')" />
                        `;
                    }

                    div.innerHTML = `
                        <div>
                            <p class="font-bold text-sm">${doc.label}</p>
                            ${!url ? '<p class="text-xs text-red-400 mt-1"><i class="fas fa-exclamation-circle"></i> Required</p>' : '<p class="text-xs text-green-400 mt-1"><i class="fas fa-check-circle"></i> Uploaded</p>'}
                        </div>
                        <div>${actionHtml}</div>
                    `;
                    docContainer.appendChild(div);
                });
            } catch (err) {
                console.error(err);
                await showPopup("Failed to load profile.");
            }
        }

        window.handleFileSelect = function(docId) {
            const input = document.getElementById(docId);
            const labelSpan = document.getElementById(`label-${docId}`);
            if(input.files.length > 0) {
                const file = input.files[0];
                labelSpan.innerText = file.name.substring(0, 15) + '...';
                labelSpan.parentElement.classList.replace('bg-[#00a8e8]/20', 'bg-green-500/20');
                labelSpan.parentElement.classList.replace('text-[#00a8e8]', 'text-green-400');
                labelSpan.parentElement.classList.replace('border-[#00a8e8]/50', 'border-green-500/50');
                
                pendingFiles.set(docId, file);
                hasPendingFiles = true;
                document.getElementById('uploadForm').classList.remove('hidden');
            }
        };

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            if(!hasPendingFiles) return;

            const btn = document.getElementById("uploadBtn");
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            btn.disabled = true;

            try {
                const res = await uploadProfile(pendingFiles, token);
                if (res.error) throw new Error(res.error);
                await showPopup("Documents uploaded successfully!", false);
                pendingFiles = new FormData();
                hasPendingFiles = false;
                document.getElementById('uploadForm').classList.add('hidden');
                loadProfile();
            } catch (err) {
                await showPopup("Upload failed: " + err.message);
            } finally {
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        };

        document.getElementById('saveInfoBtn').onclick = async () => {
            const btn = document.getElementById('saveInfoBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;
            
            const data = {
                major: document.getElementById('input-major').value,
                gender: document.getElementById('input-gender').value,
                batch: document.getElementById('input-batch').value,
                whatsapp_number: document.getElementById('input-wa').value,
            };

            try {
                const res = await updateProfile(data, token);
                if(res.error) throw new Error(res.error);
                toggleEdit();
                loadProfile();
            } catch(e) {
                await showPopup("Failed to update profile.");
            } finally {
                btn.innerHTML = 'Save Changes';
                btn.disabled = false;
            }
        };

        // Initialize
        loadProfile();
    </script>
</body>
</html>
