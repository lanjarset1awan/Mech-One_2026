<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Competition - Mech-ONE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/register-competition.css">
</head>

<body class="antialiased">

    <!-- Navbar -->
    <nav class="w-full z-50 bg-[#0a1d37]/40 backdrop-blur-md border-b border-white/10 absolute top-0">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-3 md:py-5 flex justify-between items-center">
            <div class="text-xl md:text-2xl font-black tracking-tighter shrink-0">
                <a href="index.html">MECH<span class="text-[#ffcc00]">-ONE</span> <span class="font-light hidden sm:inline">2026</span></a>
            </div>
            
            <div class="flex items-center space-x-3 md:space-x-4 shrink-0">
                <a href="profile.html" class="px-3 py-2 md:px-5 md:py-2.5 bg-white/10 hover:bg-white/20 text-white text-[10px] md:text-xs font-bold uppercase tracking-widest rounded-sm transition-colors border border-white/20">Profile</a>
                <button onclick="logout()" class="px-3 py-2 md:px-5 md:py-2.5 bg-[#800000] hover:bg-red-700 text-white text-[10px] md:text-xs font-bold uppercase tracking-widest rounded-sm transition-colors border border-white/20">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Registration Form Section -->
    <section class="flex-grow flex items-center justify-center px-4 md:px-6 pt-24 pb-12">
        <div class="glass-card p-8 md:p-12 rounded-3xl w-full max-w-4xl relative overflow-hidden shadow-2xl">
            <!-- Decorative Icon -->
            <div class="absolute top-0 right-0 p-6 opacity-10">
                <i class="fas fa-trophy text-6xl md:text-7xl text-[#ffcc00]"></i>
            </div>
            
            <h2 class="text-2xl md:text-3xl font-black mb-2 uppercase tracking-tight relative z-10">Team Registration</h2>
            <p class="text-slate-400 text-sm mb-8 relative z-10">Register your team for <span id="comp-name" class="text-[#ffcc00] font-bold">...</span></p>

            <div id="form-grid" class="grid md:grid-cols-2 gap-10 relative z-10">
                
                <!-- Left Column: General Info & Proposal -->
                <div id="left-column" class="space-y-6">
                    <h3 id="left-heading" class="text-xl font-bold border-b border-white/10 pb-2 mb-4 uppercase tracking-widest text-[#00a8e8]">General Info</h3>
                    
                    <div>
                        <label id="label-team" class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Team Name</label>
                        <input id="team" type="text" placeholder="e.g. Innovators" class="input-field w-full px-4 py-3 rounded-sm text-sm" />
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">University / Institution</label>
                        <input id="univ" type="text" placeholder="e.g. Diponegoro University" class="input-field w-full px-4 py-3 rounded-sm text-sm" />
                    </div>

                    <div class="mt-8" id="container-payment">
                        <h3 class="text-xl font-bold border-b border-white/10 pb-2 mb-4 uppercase tracking-widest text-[#00a8e8]">Payment Details</h3>
                        <div class="bg-white/5 p-4 rounded-lg mb-4 border border-white/10">
                            <p class="text-xs text-gray-400 uppercase tracking-wider font-bold">Transfer to:</p>
                            <p class="text-sm font-semibold text-white mt-1">Bank Mandiri</p>
                            <p class="text-lg font-black text-[#ffcc00] tracking-wider">1360012345678</p>
                            <p class="text-xs text-gray-300 mt-1">a.n. MECH-ONE 2026</p>
                        </div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Upload Payment Proof (JPG, PNG)</label>
                        <label class="file-upload-label h-24 flex-col text-center" for="payment-proof">
                            <i class="fas fa-receipt text-2xl text-yellow-400 mb-2"></i>
                            <span id="payment-proof-name" class="text-xs text-gray-300">Click to upload payment proof</span>
                        </label>
                        <input id="payment-proof" type="file" accept="image/png, image/jpeg, image/jpg" onchange="updateFileName('payment-proof', 'payment-proof-name')" />
                        <div id="payment-proof-preview-container" class="mt-4 hidden flex justify-center">
                            <img id="payment-proof-preview" class="max-h-48 rounded-lg border border-white/20 shadow-md" src="" alt="Payment Proof Preview" />
                        </div>
                    </div>
                </div>

                <!-- Right Column: Members -->
                <div id="right-column" class="space-y-6">
                    <h3 class="text-xl font-bold border-b border-white/10 pb-2 mb-4 uppercase tracking-widest text-[#00a8e8]">Team Members</h3>
                    
                    <div>
                        <label id="label-m1" class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Leader / Member 1</label>
                        <input id="m1" type="text" placeholder="Full Name" class="input-field w-full px-3 py-2 rounded-sm text-sm" />
                    </div>
                    <div id="container-m2">
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Member 2</label>
                        <input id="m2" type="text" placeholder="Full Name" class="input-field w-full px-3 py-2 rounded-sm text-sm" />
                    </div>
                    <div id="container-m3">
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Member 3</label>
                        <input id="m3" type="text" placeholder="Full Name" class="input-field w-full px-3 py-2 rounded-sm text-sm" />
                    </div>
                    <div id="container-m4">
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Member 4</label>
                        <input id="m4" type="text" placeholder="Full Name (Optional)" class="input-field w-full px-3 py-2 rounded-sm text-sm" />
                    </div>
                    <div id="container-m5">
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Member 5</label>
                        <input id="m5" type="text" placeholder="Full Name (Optional)" class="input-field w-full px-3 py-2 rounded-sm text-sm" />
                    </div>
                </div>
            </div>

            <div class="mt-12 border-t border-white/10 pt-8 relative z-10 flex justify-end">
                <button id="submit" class="w-full md:w-auto px-6 py-3 md:px-10 md:py-4 bg-[#ffcc00] hover:bg-yellow-400 text-[#0a1d37] font-black rounded-sm transition-transform hover:scale-105 uppercase text-sm tracking-widest shadow-lg shadow-yellow-900/30">
                    Submit Registration
                </button>
            </div>
            
        </div>
    </section>

    <script src="./js/api.js"></script>
    <script src="./js/popup.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "login.html";

        function logout() {
            localStorage.removeItem("token");
            window.location.href = "index.html";
        }

        const urlParams = new URLSearchParams(window.location.search);
        let compType = urlParams.get('type') || 'MDC';

        if (compType === 'SEM') {
            document.getElementById("comp-name").innerText = 'Seminar Nasional (SEM)';
            document.getElementById("left-heading").innerText = 'Participant Info';
            document.getElementById("label-team").innerText = 'Full Name';
            document.getElementById("team").placeholder = 'e.g. John Doe';
            
            // Hide the entire right column (Team Members)
            document.getElementById("right-column").classList.add("hidden");
            
            // Hide payment block
            document.getElementById("container-payment").classList.add("hidden");
            
            // Restructure form layout to be centered and narrower (looks more premium)
            const formGrid = document.getElementById("form-grid");
            formGrid.classList.remove("grid", "md:grid-cols-2", "gap-10");
            formGrid.classList.add("max-w-md", "mx-auto", "space-y-6");
        } else if (compType === 'BPC') {
            document.getElementById("comp-name").innerText = 'Business Plan (BPC)';
            document.getElementById("container-m4").classList.add("hidden");
            document.getElementById("container-m5").classList.add("hidden");
        } else {
            document.getElementById("comp-name").innerText = 'Mechanical Design (MDC)';
        }

        // Validate Profile before allowing registration
        async function validateProfile() {
            try {
                // Check if already registered first
                const regStatus = await getRegistrationStatus(token);
                if (regStatus && regStatus.registered) {
                    await showPopup("⚠️ Akses Ditolak!\n\nAnda sudah terdaftar di kompetisi " + regStatus.type + ". Tidak bisa mendaftar lagi.");
                    window.location.href = "index.html";
                    return;
                }

                const user = await getProfile(token);
                if (user.error) throw new Error();
                
                const requiredFields = ['major', 'gender', 'batch', 'whatsapp_number', 'student_card_url', 'instagram_story_url', 'twibbon_url', 'instagram_follow_url', 'repost_instagram_url'];
                
                let isComplete = true;
                for (const field of requiredFields) {
                    if (!user[field]) {
                        isComplete = false;
                        break;
                    }
                }

                if (!isComplete) {
                    await showPopup("⚠️ Access Denied!\n\nYou must complete your profile and upload ALL required documents before registering for a competition.");
                    window.location.href = "profile.html";
                }
            } catch (err) {
                await showPopup("Failed to verify profile status.");
                window.location.href = "profile.html";
            }
        }
        
        async function updateFileName(inputId, displayId) {
            const input = document.getElementById(inputId);
            const display = document.getElementById(displayId);
            const previewContainer = document.getElementById("payment-proof-preview-container");
            const previewImg = document.getElementById("payment-proof-preview");

            if (input.files && input.files.length > 0) {
                const file = input.files[0];
                const MAX_SIZE = 500 * 1024;
                if (file.size > MAX_SIZE) {
                    await showPopup("Ukuran file maksimal 500 KB!");
                    input.value = "";
                    display.innerText = "Click to upload payment proof";
                    display.classList.remove("text-white");
                    display.classList.add("text-gray-300");
                    previewContainer.classList.add("hidden");
                    previewImg.src = "";
                    return;
                }
                if (!file.type.startsWith("image/")) {
                    await showPopup("Format file harus gambar (JPG, PNG)!");
                    input.value = "";
                    display.innerText = "Click to upload payment proof";
                    display.classList.remove("text-white");
                    display.classList.add("text-gray-300");
                    previewContainer.classList.add("hidden");
                    previewImg.src = "";
                    return;
                }

                display.innerText = file.name;
                display.classList.add("text-white");
                display.classList.remove("text-gray-300");

                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewContainer.classList.remove("hidden");
                }
                reader.readAsDataURL(file);
            } else {
                display.innerText = "Click to upload payment proof";
                display.classList.remove("text-white");
                display.classList.add("text-gray-300");
                previewContainer.classList.add("hidden");
                previewImg.src = "";
            }
        }

        validateProfile();


    </script>

    <script>

        document.getElementById("submit").onclick = async () => {
            const btn = document.getElementById("submit");
            const originalText = btn.innerHTML;

            // Set the competition type dynamically based on URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            let currentCompType = urlParams.get('type') || 'MDC';

            const team = document.getElementById("team").value;
            const univ = document.getElementById("univ").value;
            const m1 = currentCompType === 'SEM' ? team : document.getElementById("m1").value;
            const m2 = document.getElementById("m2").value;
            const m3 = document.getElementById("m3").value;
            const paymentProofFile = document.getElementById("payment-proof").files[0];

            if (currentCompType === 'SEM') {
                if (!team || !univ) {
                    await showPopup("Please fill in your Full Name and University.");
                    return;
                }
            } else {
                if (!team || !univ || !m1 || !m2 || !m3 || !paymentProofFile) {
                    await showPopup("Please fill in the Team Name, University, Leader Name, Member 2, Member 3, and upload your payment proof.");
                    return;
                }
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append("team_name", team);
                formData.append("university", univ);
                formData.append("competition_type", currentCompType);
                formData.append("member_1", m1);
                formData.append("member_2", currentCompType === 'SEM' ? "" : m2);
                formData.append("member_3", currentCompType === 'SEM' ? "" : m3);
                formData.append("member_4", (currentCompType === 'BPC' || currentCompType === 'SEM') ? "" : document.getElementById("m4").value);
                formData.append("member_5", (currentCompType === 'BPC' || currentCompType === 'SEM') ? "" : document.getElementById("m5").value);
                
                if (currentCompType !== 'SEM') {
                    formData.append("file", paymentProofFile);
                }

                const res = await registerCompetition(formData, token);
                
                if (res.error) {
                    await showPopup("Registrasi gagal: " + res.error);
                } else {
                    await showPopup("Registrasi sukses", false);
                    window.location.href = "index.html"; // Redirect to home after success
                }
            } catch (err) {
                await showPopup("Terjadi kesalahan sistem saat registrasi kompetisi: " + err.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
